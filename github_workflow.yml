name: LLMOps CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  continuous_integration:
    name: Run Evaluations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install databricks-sdk mlflow langchain

      - name: Configure Databricks CLI
        uses: databricks/setup-cli@v0.211.0

      - name: Run MLflow Evaluate Benchmark
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        # This script should be designed to exit with code 1 if the score < 90%
        run: |
          python src/evaluation/evaluator.py

  continuous_deployment:
    name: Deploy to Production
    needs: continuous_integration
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Only deploy on merges to main
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure Databricks CLI
        uses: databricks/setup-cli@v0.211.0

      - name: Register Model
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          python src/llmops/registry.py

      - name: Update Serving Endpoint
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        # Or alternatively: databricks bundle deploy -t prod
        run: |
          python src/llmops/deploy.py
